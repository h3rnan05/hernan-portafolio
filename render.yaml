# Render Blueprint — one-click deploy of the backend.
#
# Usage:
#   1. Sign in at https://render.com with GitHub
#   2. Render → "+ New" → "Blueprint"
#   3. Select `guth888/hernan-portafolio`
#   4. Render reads this file, prompts for the env vars marked `sync: false`
#   5. Paste each one (DATABASE_URL, FRED_API_KEY, etc.) → Deploy
#
# Free plan caveats:
#   - Service sleeps after 15 minutes of inactivity (cold start ~30s)
#   - 750 hours/month included
#   - Auto-deploys on every push to main
services:
  - type: cron
    name: hernan-trading-bot
    runtime: docker
    region: ohio
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # 9:25 AM ET (UTC-5 winter / UTC-4 summer) — antes de que abra el mercado
    # Ajustado a 14:25 UTC para cubrir horario de verano (EDT)
    schedule: "25 13 * * 1-5"
    startCommand: bash scripts/morning_run.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ADMIN_BEARER_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # ── Bot 1: OLS Model Bot (P4) ──────────────────────────────────────────
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      # ── Bot 2: P0 Ultra Conservative ───────────────────────────────────────
      - key: ALPACA_P0_API_KEY
        sync: false
      - key: ALPACA_P0_SECRET_KEY
        sync: false
      # ── Bot 3: Nancy Pelosi Mirror ─────────────────────────────────────────
      - key: ALPACA_PELOSI_API_KEY
        sync: false
      - key: ALPACA_PELOSI_SECRET_KEY
        sync: false
      # ── Optional: QuiverQuant (datos de Pelosi) ────────────────────────────
      - key: QUIVERQUANT_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: HTTP_USER_AGENT
        value: "Mozilla/5.0 (compatible; hernan-portafolio/0.1; +render)"

  - type: web
    name: hernan-backend
    runtime: docker
    region: ohio
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ─── Database (paste at deploy time) ───────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false

      # ─── API keys (paste at deploy time) ───────────────────────────────────
      - key: FRED_API_KEY
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ADMIN_BEARER_TOKEN
        sync: false

      # ─── AI assistant (Claude) — required for the /chat endpoint ───────────
      # Get a key at https://console.anthropic.com → API Keys.
      # NOTE: this belongs on the BACKEND (Render), not on Vercel. The frontend
      # never sees it; it only streams from this service's /chat endpoint.
      - key: ANTHROPIC_API_KEY
        sync: false

      # ─── Telegram trade-idea chat (wizards bot) ────────────────────────────
      # Bot de @BotFather; tu chat id; un secreto inventado para el webhook;
      # y un PAT fine-grained (contents:write en este repo) para encolar ideas.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_BOT_TOKEN
        sync: false

      # ─── Capital.com (optional; leave blank if not using) ──────────────────
      - key: CAPITAL_API_KEY
        sync: false
      - key: CAPITAL_IDENTIFIER
        sync: false
      - key: CAPITAL_API_PASSWORD
        sync: false

      # ─── Hardcoded non-sensitive defaults ──────────────────────────────────
      - key: CAPITAL_BASE_URL
        value: https://demo-api-capital.backend-capital.com
      - key: LOG_LEVEL
        value: INFO
      - key: HTTP_USER_AGENT
        value: "Mozilla/5.0 (compatible; hernan-portafolio/0.1; +render)"

      # ─── CORS — update with Vercel URL after frontend deploy ───────────────
      - key: ALLOWED_ORIGINS
        sync: false
